<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Path & Sensor Visualization</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <h2>Parameters</h2>
            
            <div class="input-group">
                <label for="preset">Preset Test Case</label>
                <select id="preset">
                    <option value="">-- Custom --</option>
                </select>
            </div>
            
            <hr>
            
            <div class="input-group">
                <label for="d1">d1 (y offset to D1)</label>
                <input type="number" id="d1" value="2" step="0.1">
            </div>
            <div class="input-group">
                <label for="d2">d2 (straight path D1 to D2)</label>
                <input type="number" id="d2" value="3" step="0.1">
            </div>
            <div class="input-group">
                <label for="d3">d3 (x offset for D1, D2)</label>
                <input type="number" id="d3" value="1.5" step="0.1">
            </div>
            
            <hr>
            
            <div class="input-group">
                <label>A1 (x, y)</label>
                <div class="split-inputs">
                    <input type="number" id="a1_x" value="1" step="0.1" placeholder="x">
                    <input type="number" id="a1_y" value="1" step="0.1" placeholder="y">
                </div>
            </div>
            
            <div class="input-group">
                <label>A2 (x, y)</label>
                <div class="split-inputs">
                    <input type="number" id="a2_x" value="1" step="0.1" placeholder="x">
                    <input type="number" id="a2_y" value="-1" step="0.1" placeholder="y">
                </div>
            </div>

            <div class="input-group">
                <label for="sensor_h">Sensor Height (z)</label>
                <input type="number" id="sensor_h" value="0.5" step="0.1">
            </div>
            
            <hr>
            
            <div class="input-group">
                <label for="direction">Direction</label>
                <select id="direction">
                    <option value="positive">Positive (+y)</option>
                    <option value="negative">Negative (-y)</option>
                </select>
            </div>
        </aside>
        
        <main class="content">
            <header>
                <h1>One-Shot Docking Path Generator</h1>
                <p>2D Top View Visualization</p>
            </header>
            
            <div class="plot-container">
                <svg id="plot" width="100%" height="100%">
                    <!-- SVG elements will be generated by JS -->
                </svg>
            </div>
            
            <div class="info-panel" id="info">
                <!-- Info will be shown here -->
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
